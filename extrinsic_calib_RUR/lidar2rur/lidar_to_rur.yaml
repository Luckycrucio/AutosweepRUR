quality:
  # True when the numerical optimizer terminates without reporting a failure.
  # This confirms convergence, but does not by itself guarantee an accurate calibration.
  optimizer_success: true
  # Reason reported by the optimizer for stopping. `ftol` means that the reduction
  # of the objective function became smaller than the configured tolerance.
  optimizer_message: '`ftol` termination condition is satisfied.'
  # Final value of the least-squares objective minimized by the optimizer.
  # Lower is better, but it is only directly comparable between runs that use the
  # same residual definitions, weights, number of pairs, and optimizer settings.
  cost: 0.5883193277879195
  # Root-mean-square disagreement between corresponding base and LiDAR relative
  # translations after applying the estimated transform, expressed in metres.
  translation_residual_rmse_m: 0.03427182439739077
  # Root-mean-square disagreement between corresponding relative rotations after
  # applying the estimated transform, expressed in degrees.
  rotation_residual_rmse_deg: 4.217947242685025
  # Singular values of the optimizer Jacobian for the estimated planar parameters.
  # Values far from zero indicate observable directions; similarly sized values
  # indicate that the parameters are constrained with comparable strength.
  jacobian_singular_values:
  - 7.883040464511387
  - 4.527322009475279
  - 3.33724006164259
  # Ratio of the largest Jacobian singular value to the smallest. Values near 1
  # are best; a very large value indicates weak observability or poor conditioning.
  jacobian_condition_number: 2.3621436632974353
  # Number of time-aligned base/LiDAR odometry poses retained as keyframes.
  synchronized_keyframes: 80
  # Number of relative-motion constraints constructed from the synchronized
  # keyframes and used by the hand-eye optimizer.
  relative_motion_pairs: 305
  # Mean absolute time difference, in seconds, between each paired base and LiDAR pose.
  mean_sync_delta_s: 0.004468083100000001
  # Largest absolute time difference, in seconds, among synchronized pose pairs.
  max_sync_delta_s: 0.005561145
  motion:
    base_translation_sum_m: 123.24243665617676
    lidar_translation_sum_m: 119.78960200888173
    base_abs_rotation_sum_deg: 3693.407238754576
    lidar_abs_rotation_sum_deg: 2834.7440739363706
    base_max_translation_m: 1.3045536652579237
    lidar_max_translation_m: 1.2734369623682382
    base_max_rotation_deg: 49.847341504081406
    lidar_max_rotation_deg: 38.560803772322146
notes: In planar mode z/roll/pitch are copied from the initial guess; planar ground
  motion cannot estimate them reliably.
